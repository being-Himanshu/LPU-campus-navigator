<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Campus Navigator — Real-Time IoT Dashboard</title>
<meta name="description" content="Smart Campus Navigation and Monitoring System with real-time crowd tracking, environmental sensors, and 360° room tours.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<style>
/* ═══════════════════════════════════════ */
/*  CSS RESET & GLOBALS                    */
/* ═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070b12;--card:#111c2d;--card-border:#1a2840;
  --cyan:#00e5ff;--green:#00ff9f;--amber:#ffab00;--red:#ff3d00;
  --text:#e0e6f0;--text-dim:#7a8ba7;--text-bright:#ffffff;
  --font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --panel-width:380px;--header-h:60px;--nav-h:48px;
  --radius:12px;--radius-sm:8px;
}
html{font-size:14px;scroll-behavior:smooth}
body{
  font-family:var(--font-body);background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
}
button{font-family:var(--font-body);cursor:pointer;border:none;outline:none}
/* scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:3px}

/* ═══════════════════════════════════════ */
/*  HEADER                                 */
/* ═══════════════════════════════════════ */
#app-header{
  height:var(--header-h);background:linear-gradient(135deg,#0a1628,#111c2d);
  border-bottom:1px solid var(--card-border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--cyan),#0091ea);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:800;color:#fff;
}
.logo-text{font-size:18px;font-weight:700;color:var(--text-bright);letter-spacing:-0.3px}
.logo-text span{color:var(--cyan)}
.header-right{display:flex;align-items:center;gap:20px}

/* Mode toggle */
.mode-toggle{
  display:flex;align-items:center;gap:10px;
  background:var(--bg);padding:6px 14px;border-radius:24px;
  border:1px solid var(--card-border);font-size:12px;font-weight:600;
}
.mode-label{color:var(--text-dim);transition:color .3s}
.mode-label.active{color:var(--cyan)}
.toggle-switch{
  width:44px;height:22px;border-radius:11px;
  background:#1a2840;position:relative;cursor:pointer;
  transition:background .3s;
}
.toggle-switch.live{background:var(--cyan)}
.toggle-knob{
  width:18px;height:18px;border-radius:50%;
  background:#fff;position:absolute;top:2px;left:2px;
  transition:transform .3s;box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.toggle-switch.live .toggle-knob{transform:translateX(22px)}

/* Connection chips */
.conn-chips{display:flex;gap:8px}
.conn-chip{
  display:flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:20px;
  background:var(--bg);border:1px solid var(--card-border);
  font-size:11px;font-family:var(--font-mono);color:var(--text-dim);
}
.conn-dot{
  width:8px;height:8px;border-radius:50%;background:var(--green);
  animation:pulse-dot 2s infinite;
}
.conn-dot.disconnected{background:var(--red);animation:none}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}

/* ═══════════════════════════════════════ */
/*  SMART NAV BAR                          */
/* ═══════════════════════════════════════ */
#smart-nav{
  height:var(--nav-h);
  background:linear-gradient(90deg,rgba(0,229,255,.08),rgba(0,255,159,.06));
  border-bottom:1px solid rgba(0,229,255,.15);
  display:flex;align-items:center;justify-content:center;
  padding:0 24px;gap:12px;position:sticky;top:var(--header-h);z-index:99;
}
.nav-icon{font-size:16px}
#smart-text{
  font-size:13px;font-weight:500;color:var(--text);
  font-family:var(--font-mono);letter-spacing:-.2px;
}
#smart-text .hl{color:var(--cyan);font-weight:700}
#smart-text .low{color:var(--green)}
#smart-text .med{color:var(--amber)}
#smart-text .high{color:var(--red)}

/* ═══════════════════════════════════════ */
/*  MAIN LAYOUT                            */
/* ═══════════════════════════════════════ */
#main-wrap{
  display:flex;height:calc(100vh - var(--header-h) - var(--nav-h));
  position:relative;overflow:hidden;
}
#map-area{
  flex:1;padding:20px;overflow:auto;position:relative;
  display:flex;flex-direction:column;align-items:center;
}

/* Floor toggle */
.floor-tabs{
  display:flex;gap:8px;margin-bottom:16px;
}
.floor-tab{
  padding:8px 24px;border-radius:var(--radius-sm);
  background:var(--card);border:1px solid var(--card-border);
  color:var(--text-dim);font-weight:600;font-size:13px;
  transition:all .3s;
}
.floor-tab:hover{border-color:var(--cyan);color:var(--text)}
.floor-tab.active{
  background:linear-gradient(135deg,rgba(0,229,255,.15),rgba(0,229,255,.05));
  border-color:var(--cyan);color:var(--cyan);
  box-shadow:0 0 20px rgba(0,229,255,.15);
}

/* SVG Map container */
#map-container{
  width:100%;max-width:900px;
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius);overflow:hidden;position:relative;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
#map-container svg{width:100%;height:auto;display:block}

/* Room hover & selected */
.room-rect{
  fill:rgba(17,28,45,.6);stroke:var(--card-border);stroke-width:1.5;
  cursor:pointer;transition:all .3s;
}
.room-rect:hover{
  fill:rgba(0,229,255,.08);stroke:var(--cyan);
  filter:drop-shadow(0 0 8px rgba(0,229,255,.3));
}
.room-rect.selected{
  stroke:var(--cyan);stroke-width:2.5;
  fill:rgba(0,229,255,.1);
  filter:drop-shadow(0 0 14px rgba(0,229,255,.4));
  animation:glow-border 2s infinite;
}
@keyframes glow-border{
  0%,100%{filter:drop-shadow(0 0 10px rgba(0,229,255,.3))}
  50%{filter:drop-shadow(0 0 20px rgba(0,229,255,.6))}
}
.room-label{
  fill:var(--text);font-family:var(--font-body);font-size:11px;
  font-weight:600;pointer-events:none;text-anchor:middle;
}
.room-count{
  fill:var(--text-bright);font-family:var(--font-mono);font-size:13px;
  font-weight:700;pointer-events:none;text-anchor:middle;
}
/* crowd dot */
.crowd-dot{pointer-events:none}
.crowd-dot.low{fill:var(--green)}
.crowd-dot.medium{fill:var(--amber)}
.crowd-dot.high{fill:var(--red)}
/* grid */
.grid-line{stroke:rgba(255,255,255,.03);stroke-width:.5}
/* nav path */
#nav-path{
  fill:none;stroke:var(--cyan);stroke-width:2.5;
  stroke-dasharray:8 6;stroke-linecap:round;
  opacity:0;transition:opacity .5s;
}
#nav-path.visible{opacity:1;animation:dash-move 1s linear infinite}
@keyframes dash-move{to{stroke-dashoffset:-14}}
/* blueprint labels */
.bp-label{
  fill:rgba(0,229,255,.25);font-family:var(--font-mono);font-size:9px;
  pointer-events:none;text-anchor:start;
}
/* staircase pattern */
.stair-line{stroke:var(--text-dim);stroke-width:.8;opacity:.4}

/* ═══════════════════════════════════════ */
/*  SIDE PANEL                             */
/* ═══════════════════════════════════════ */
#side-panel{
  width:var(--panel-width);background:var(--card);
  border-left:1px solid var(--card-border);
  transform:translateX(100%);transition:transform .4s cubic-bezier(.22,1,.36,1);
  position:absolute;right:0;top:0;bottom:0;z-index:50;
  overflow-y:auto;padding:24px;
  display:flex;flex-direction:column;gap:20px;
}
#side-panel.open{transform:translateX(0)}
.panel-close{
  position:absolute;top:12px;right:12px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.06);color:var(--text-dim);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:all .2s;
}
.panel-close:hover{background:rgba(255,61,0,.2);color:var(--red)}
.panel-room-name{
  font-size:22px;font-weight:800;color:var(--text-bright);
  letter-spacing:-.5px;padding-right:40px;
}
.panel-floor{
  font-size:12px;color:var(--text-dim);font-weight:500;
  margin-top:-12px;
}
/* crowd badge */
.crowd-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 18px;border-radius:24px;
  font-size:14px;font-weight:700;font-family:var(--font-mono);
}
.crowd-badge.low{background:rgba(0,255,159,.12);color:var(--green);border:1px solid rgba(0,255,159,.3)}
.crowd-badge.medium{background:rgba(255,171,0,.12);color:var(--amber);border:1px solid rgba(255,171,0,.3)}
.crowd-badge.high{background:rgba(255,61,0,.12);color:var(--red);border:1px solid rgba(255,61,0,.3)}
.crowd-badge-dot{width:10px;height:10px;border-radius:50%;animation:pulse-dot 1.5s infinite}
.crowd-badge.low .crowd-badge-dot{background:var(--green)}
.crowd-badge.medium .crowd-badge-dot{background:var(--amber)}
.crowd-badge.high .crowd-badge-dot{background:var(--red)}

/* stat cards */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat-card{
  background:var(--bg);border:1px solid var(--card-border);
  border-radius:var(--radius-sm);padding:14px 12px;text-align:center;
}
.stat-icon{font-size:20px;margin-bottom:6px}
.stat-val{
  font-family:var(--font-mono);font-size:20px;font-weight:700;
  color:var(--text-bright);
}
.stat-label{font-size:11px;color:var(--text-dim);margin-top:2px}
.last-updated{
  font-size:11px;color:var(--text-dim);font-family:var(--font-mono);
  text-align:center;
}

/* panel buttons */
.panel-btn{
  width:100%;padding:14px;border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;display:flex;
  align-items:center;justify-content:center;gap:8px;
  transition:all .3s;
}
.btn-tour{
  background:linear-gradient(135deg,var(--cyan),#0091ea);
  color:#000;
}
.btn-tour:hover{box-shadow:0 0 24px rgba(0,229,255,.4);transform:translateY(-1px)}
.btn-dir{
  background:transparent;border:1px solid var(--card-border);
  color:var(--text);
}
.btn-dir:hover{border-color:var(--cyan);color:var(--cyan)}

/* ═══════════════════════════════════════ */
/*  360° VIEWER                            */
/* ═══════════════════════════════════════ */
#pano-overlay{
  position:fixed;inset:0;z-index:200;background:#000;
  display:none;opacity:0;transition:opacity .4s;
}
#pano-overlay.active{display:flex;flex-direction:column;opacity:1}
#pano-container{flex:1;position:relative}
#pano-top-bar{
  position:absolute;top:0;left:0;right:0;z-index:210;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:16px 20px;pointer-events:none;
}
#pano-top-bar>*{pointer-events:all}
.pano-room-label{
  background:rgba(0,0,0,.65);backdrop-filter:blur(8px);
  padding:10px 18px;border-radius:var(--radius-sm);
  border:1px solid rgba(0,229,255,.3);
}
.pano-room-label h3{font-size:16px;font-weight:700;color:var(--text-bright)}
.pano-room-label p{font-size:11px;color:var(--text-dim);margin-top:2px}
.pano-stats{
  display:flex;gap:10px;
}
.pano-stat{
  background:rgba(0,0,0,.65);backdrop-filter:blur(8px);
  padding:8px 14px;border-radius:var(--radius-sm);
  border:1px solid var(--card-border);
  font-family:var(--font-mono);font-size:13px;
  color:var(--text-bright);display:flex;align-items:center;gap:6px;
}
.pano-close{
  position:absolute;top:16px;right:20px;z-index:220;
  width:40px;height:40px;border-radius:50%;
  background:rgba(0,0,0,.7);color:#fff;font-size:22px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(255,255,255,.15);transition:all .2s;
}
.pano-close:hover{background:rgba(255,61,0,.4);border-color:var(--red)}
/* minimap in pano */
#pano-minimap{
  position:absolute;bottom:20px;right:20px;z-index:210;
  width:180px;height:130px;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  border:1px solid var(--card-border);border-radius:var(--radius-sm);
  overflow:hidden;
}
#pano-minimap svg{width:100%;height:100%}
.minimap-highlight{
  fill:rgba(0,229,255,.3);stroke:var(--cyan);stroke-width:2;
  animation:glow-border 2s infinite;
}

/* ═══════════════════════════════════════ */
/*  LIVE MODE BANNER                       */
/* ═══════════════════════════════════════ */
#live-banner{
  display:none;background:rgba(255,171,0,.1);
  border:1px solid rgba(255,171,0,.3);
  border-radius:var(--radius-sm);padding:12px 20px;
  margin:12px 20px 0;font-size:13px;color:var(--amber);
  text-align:center;font-weight:500;
  animation:fade-in .4s;
}
#live-banner.show{display:block}
@keyframes fade-in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════ */
/*  RESPONSIVE                             */
/* ═══════════════════════════════════════ */
@media(max-width:768px){
  :root{--panel-width:100vw}
  #app-header{padding:0 12px;flex-wrap:wrap;height:auto;min-height:56px;padding:8px 12px}
  .logo-text{font-size:15px}
  .conn-chips{display:none}
  .mode-toggle{padding:4px 10px;font-size:11px}
  #smart-nav{padding:0 12px;height:auto;min-height:40px;flex-wrap:wrap;text-align:center;padding:6px 12px}
  #smart-text{font-size:11px}
  #map-area{padding:12px}
  .floor-tab{padding:6px 16px;font-size:12px}
  #side-panel{border-left:none;border-top:1px solid var(--card-border)}
  .stat-grid{grid-template-columns:1fr 1fr 1fr}
  #pano-minimap{width:120px;height:90px}
}
</style>
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<header id="app-header">
  <div class="logo">
    <div class="logo-icon">SC</div>
    <div class="logo-text">Smart<span>Campus</span></div>
  </div>
  <div class="header-right">
    <div class="conn-chips" id="conn-chips">
      <div class="conn-chip"><span class="conn-dot" id="conn1"></span>ESP32 Floor 1: <span id="conn1-txt">Connected</span></div>
      <div class="conn-chip"><span class="conn-dot" id="conn2"></span>ESP32 Floor 2: <span id="conn2-txt">Connected</span></div>
    </div>
    <div class="mode-toggle">
      <span class="mode-label active" id="demo-label">DEMO</span>
      <div class="toggle-switch" id="mode-switch" onclick="toggleMode()">
        <div class="toggle-knob"></div>
      </div>
      <span class="mode-label" id="live-label">LIVE</span>
    </div>
  </div>
</header>

<!-- ═══════════════ SMART NAV ═══════════════ -->
<div id="smart-nav">
  <span class="nav-icon">🧭</span>
  <span id="smart-text">Calculating best route…</span>
</div>

<!-- ═══════════════ LIVE BANNER ═══════════════ -->
<div id="live-banner">⚡ Waiting for ESP32 data… Make sure Flask server is running at <b>http://[SERVER_IP]:5000/status</b></div>

<!-- ═══════════════ MAIN ═══════════════ -->
<div id="main-wrap">
  <div id="map-area">
    <!-- Floor tabs -->
    <div class="floor-tabs">
      <button class="floor-tab active" id="tab-f1" onclick="switchFloor(1)">Floor 1</button>
      <button class="floor-tab" id="tab-f2" onclick="switchFloor(2)">Floor 2</button>
    </div>
    <!-- Map -->
    <div id="map-container"></div>
  </div>

  <!-- Side Panel -->
  <aside id="side-panel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <h2 class="panel-room-name" id="p-name">—</h2>
    <p class="panel-floor" id="p-floor">—</p>
    <div id="p-badge"></div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-val" id="p-people">—</div>
        <div class="stat-label">People</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🌡️</div>
        <div class="stat-val" id="p-temp">—</div>
        <div class="stat-label">Temp °C</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💧</div>
        <div class="stat-val" id="p-hum">—</div>
        <div class="stat-label">Humidity</div>
      </div>
    </div>
    <div class="last-updated">Last updated: <span id="p-updated">—</span></div>
    <button class="panel-btn btn-tour" onclick="open360()">🔭 View 360° Tour</button>
    <button class="panel-btn btn-dir" onclick="showDirections()">🗺️ Get Directions</button>
  </aside>
</div>

<!-- ═══════════════ 360° OVERLAY ═══════════════ -->
<div id="pano-overlay">
  <div id="pano-container">
    <div id="pano-top-bar">
      <div class="pano-room-label">
        <h3 id="pano-title">Room</h3>
        <p id="pano-sub">Floor 1</p>
      </div>
      <div class="pano-stats">
        <div class="pano-stat">👥 <span id="pano-people">0</span></div>
        <div class="pano-stat">🌡️ <span id="pano-temp">0°C</span></div>
      </div>
    </div>
    <button class="pano-close" onclick="close360()">✕</button>
    <div id="pano-minimap"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════ */
/*  DATA MODEL                             */
/* ═══════════════════════════════════════ */
const rooms = {
  // Floor 1
  'main-entrance':  {name:'Main Entrance', floor:1, people:4,  temp:27, hum:60, x:60,  y:240, w:160, h:100, type:'entrance'},
  'corridor-f1':    {name:'Corridor',      floor:1, people:3,  temp:28, hum:62, x:60,  y:120, w:680, h:60,  type:'corridor'},
  'classroom-101':  {name:'Classroom 101', floor:1, people:18, temp:31, hum:72, x:60,  y:20,  w:160, h:100, type:'room'},
  'classroom-102':  {name:'Classroom 102', floor:1, people:6,  temp:28, hum:63, x:240, y:20,  w:160, h:100, type:'room'},
  'computer-lab':   {name:'Computer Lab',  floor:1, people:24, temp:33, hum:75, x:420, y:20,  w:180, h:100, type:'lab'},
  'washroom-f1':    {name:'Washroom',      floor:1, people:1,  temp:26, hum:58, x:620, y:20,  w:120, h:100, type:'utility'},
  'staircase-f1':   {name:'Staircase',     floor:1, people:0,  temp:25, hum:55, x:660, y:200, w:80,  h:140, type:'stairs'},
  // Floor 2
  'classroom-201':  {name:'Classroom 201', floor:2, people:12, temp:27, hum:61, x:60,  y:20,  w:160, h:100, type:'room'},
  'classroom-202':  {name:'Classroom 202', floor:2, people:3,  temp:26, hum:57, x:240, y:20,  w:160, h:100, type:'room'},
  'science-lab':    {name:'Science Lab',   floor:2, people:20, temp:29, hum:66, x:420, y:20,  w:180, h:100, type:'lab'},
  'staff-room':     {name:'Staff Room',    floor:2, people:2,  temp:24, hum:52, x:620, y:20,  w:120, h:100, type:'room'},
  'corridor-f2':    {name:'Corridor',      floor:2, people:2,  temp:27, hum:60, x:60,  y:120, w:680, h:60,  type:'corridor'},
  'library':        {name:'Library',       floor:2, people:8,  temp:25, hum:55, x:60,  y:200, w:200, h:140, type:'room'},
  'staircase-f2':   {name:'Staircase',     floor:2, people:0,  temp:25, hum:55, x:660, y:200, w:80,  h:140, type:'stairs'},
};

// Navigation graph (adjacency)
const navGraph = {
  'main-entrance': ['corridor-f1'],
  'corridor-f1':   ['main-entrance','classroom-101','classroom-102','computer-lab','washroom-f1','staircase-f1'],
  'classroom-101': ['corridor-f1'],
  'classroom-102': ['corridor-f1'],
  'computer-lab':  ['corridor-f1'],
  'washroom-f1':   ['corridor-f1'],
  'staircase-f1':  ['corridor-f1','staircase-f2'],
  'staircase-f2':  ['corridor-f2','staircase-f1'],
  'corridor-f2':   ['staircase-f2','classroom-201','classroom-202','science-lab','staff-room','library'],
  'classroom-201': ['corridor-f2'],
  'classroom-202': ['corridor-f2'],
  'science-lab':   ['corridor-f2'],
  'staff-room':    ['corridor-f2'],
  'library':       ['corridor-f2'],
};

let currentFloor = 1;
let selectedRoom = null;
let isLiveMode = false;
let panelUpdateTime = Date.now();
let panoViewer = null;
let panoScene = null;

/* ═══════════════════════════════════════ */
/*  CROWD HELPERS                          */
/* ═══════════════════════════════════════ */
function crowdLevel(n) { return n <= 10 ? 'low' : n <= 25 ? 'medium' : 'high'; }
function crowdLabel(n) { return n <= 10 ? 'LOW' : n <= 25 ? 'MEDIUM' : 'HIGH'; }
function crowdColor(n) {
  const l = crowdLevel(n);
  return l === 'low' ? '#00ff9f' : l === 'medium' ? '#ffab00' : '#ff3d00';
}

/* ═══════════════════════════════════════ */
/*  SVG MAP RENDERER                       */
/* ═══════════════════════════════════════ */
function renderMap() {
  const svgW = 800, svgH = 400;
  const floorRooms = Object.entries(rooms).filter(([,r]) => r.floor === currentFloor);
  let svg = `<svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg" style="background:#0a0f1a">`;

  // Grid
  for (let gx = 0; gx <= svgW; gx += 20) svg += `<line class="grid-line" x1="${gx}" y1="0" x2="${gx}" y2="${svgH}"/>`;
  for (let gy = 0; gy <= svgH; gy += 20) svg += `<line class="grid-line" x1="0" y1="${gy}" x2="${svgW}" y2="${gy}"/>`;

  // Blueprint border
  svg += `<rect x="40" y="8" width="720" height="380" fill="none" stroke="rgba(0,229,255,.12)" stroke-width="1" rx="4"/>`;
  svg += `<text class="bp-label" x="50" y="396">FLOOR ${currentFloor} — SMART CAMPUS BLUEPRINT v2.1</text>`;
  svg += `<text class="bp-label" x="580" y="396">SCALE 1:200 | ALL DIMS IN CM</text>`;

  // Outer walls
  svg += `<rect x="50" y="12" width="700" height="370" fill="none" stroke="rgba(0,229,255,.18)" stroke-width="2" rx="2"/>`;

  // Navigation path (hidden by default)
  svg += `<path id="nav-path" d=""/>`;

  // Rooms
  for (const [id, r] of floorRooms) {
    const sel = selectedRoom === id ? ' selected' : '';
    const cc = crowdColor(r.people);
    const cx = r.x + r.w / 2, cy = r.y + r.h / 2;

    // Room rectangle
    svg += `<rect class="room-rect${sel}" id="rect-${id}" x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" rx="4" onclick="selectRoom('${id}')"/>`;

    // Staircase pattern
    if (r.type === 'stairs') {
      for (let si = 0; si < 5; si++) {
        const sy = r.y + 20 + si * 22;
        svg += `<line class="stair-line" x1="${r.x + 10}" y1="${sy}" x2="${r.x + r.w - 10}" y2="${sy}"/>`;
      }
      svg += `<text class="bp-label" x="${r.x + 8}" y="${r.y + 14}" style="font-size:8px">▲ UP/DOWN</text>`;
    }

    // Door indicator
    if (r.type !== 'corridor' && r.type !== 'stairs') {
      const doorX = r.x + r.w / 2 - 10;
      const doorY = r.y + r.h;
      svg += `<rect x="${doorX}" y="${doorY - 3}" width="20" height="6" fill="rgba(0,229,255,.25)" rx="1"/>`;
    }

    // Entrance arrow
    if (r.type === 'entrance') {
      svg += `<polygon points="${r.x + r.w / 2 - 8},${r.y + r.h + 15} ${r.x + r.w / 2 + 8},${r.y + r.h + 15} ${r.x + r.w / 2},${r.y + r.h + 5}" fill="var(--cyan)" opacity=".6"/>`;
      svg += `<text x="${r.x + r.w / 2}" y="${r.y + r.h + 28}" fill="var(--cyan)" font-size="9" font-family="var(--font-mono)" text-anchor="middle" opacity=".7">ENTRY</text>`;
    }

    // Crowd dot (pulsing)
    svg += `<circle class="crowd-dot ${crowdLevel(r.people)}" id="dot-${id}" cx="${r.x + 14}" cy="${r.y + 14}" r="5">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    </circle>`;

    // Room label
    svg += `<text class="room-label" x="${cx}" y="${cy - 4}">${r.name}</text>`;

    // People count
    svg += `<text class="room-count" id="count-${id}" x="${cx}" y="${cy + 14}" fill="${cc}">${r.people}</text>`;
  }

  // Dimension lines (decorative)
  svg += `<line x1="50" y1="390" x2="750" y2="390" stroke="rgba(0,229,255,.1)" stroke-width=".5"/>`;
  svg += `<text class="bp-label" x="380" y="398" text-anchor="middle" style="font-size:8px">35.0 m</text>`;

  svg += `</svg>`;
  document.getElementById('map-container').innerHTML = svg;
}

/* ═══════════════════════════════════════ */
/*  ROOM SELECTION                         */
/* ═══════════════════════════════════════ */
function selectRoom(id) {
  selectedRoom = id;
  const r = rooms[id];
  if (r.floor !== currentFloor) {
    currentFloor = r.floor;
    updateFloorTabs();
  }
  renderMap();
  updatePanel();
  document.getElementById('side-panel').classList.add('open');
  panelUpdateTime = Date.now();
}

function closePanel() {
  document.getElementById('side-panel').classList.remove('open');
  selectedRoom = null;
  renderMap();
}

function updatePanel() {
  if (!selectedRoom) return;
  const r = rooms[selectedRoom];
  const lvl = crowdLevel(r.people);
  document.getElementById('p-name').textContent = r.name;
  document.getElementById('p-floor').textContent = `Floor ${r.floor}`;
  document.getElementById('p-badge').innerHTML = `<span class="crowd-badge ${lvl}"><span class="crowd-badge-dot"></span>${crowdLabel(r.people)}</span>`;
  document.getElementById('p-people').textContent = r.people;
  document.getElementById('p-temp').textContent = r.temp.toFixed(1);
  document.getElementById('p-hum').textContent = r.hum + '%';
  const ago = Math.floor((Date.now() - panelUpdateTime) / 1000);
  document.getElementById('p-updated').textContent = ago + 's ago';
}

/* ═══════════════════════════════════════ */
/*  FLOOR SWITCHING                        */
/* ═══════════════════════════════════════ */
function switchFloor(f) {
  currentFloor = f;
  updateFloorTabs();
  if (selectedRoom && rooms[selectedRoom].floor !== f) {
    selectedRoom = null;
    document.getElementById('side-panel').classList.remove('open');
  }
  renderMap();
}
function updateFloorTabs() {
  document.getElementById('tab-f1').classList.toggle('active', currentFloor === 1);
  document.getElementById('tab-f2').classList.toggle('active', currentFloor === 2);
}

/* ═══════════════════════════════════════ */
/*  NAVIGATION PATH (BFS)                 */
/* ═══════════════════════════════════════ */
function bfs(start, end) {
  if (start === end) return [start];
  const visited = new Set([start]);
  const queue = [[start]];
  while (queue.length) {
    const path = queue.shift();
    const node = path[path.length - 1];
    for (const nb of (navGraph[node] || [])) {
      if (visited.has(nb)) continue;
      const np = [...path, nb];
      if (nb === end) return np;
      visited.add(nb);
      queue.push(np);
    }
  }
  return null;
}

function showDirections() {
  if (!selectedRoom) return;
  const start = rooms[selectedRoom].floor === 1 ? 'main-entrance' : 'staircase-f2';
  const path = bfs(start, selectedRoom);
  if (!path || path.length < 2) return;

  // Navigate to the correct floor if necessary
  const targetFloor = rooms[selectedRoom].floor;
  if (currentFloor !== targetFloor) {
    switchFloor(targetFloor);
  }

  // Build SVG path
  const points = path
    .filter(id => rooms[id].floor === currentFloor)
    .map(id => {
      const r = rooms[id];
      return { x: r.x + r.w / 2, y: r.y + r.h / 2 };
    });

  if (points.length < 2) return;
  let d = `M${points[0].x},${points[0].y}`;
  for (let i = 1; i < points.length; i++) d += ` L${points[i].x},${points[i].y}`;

  const np = document.getElementById('nav-path');
  if (np) {
    np.setAttribute('d', d);
    np.classList.add('visible');
  }

  // Update smart text
  const stepsText = path.map(id => rooms[id].name).join(' → ');
  document.getElementById('smart-text').innerHTML =
    `Suggested route: <span class="hl">${stepsText}</span> (${path.length} steps)`;
}

/* ═══════════════════════════════════════ */
/*  DATA SIMULATION                        */
/* ═══════════════════════════════════════ */
function simulateData() {
  for (const [id, r] of Object.entries(rooms)) {
    if (r.type === 'stairs') continue;
    // fluctuate people ±1 to ±3
    const delta = Math.floor(Math.random() * 5) - 2; // -2..+2
    r.people = Math.max(0, Math.min(50, r.people + delta));
  }
  panelUpdateTime = Date.now();
  updateMapCounts();
  updatePanel();
  updateSmartNav();
}

function simulateEnv() {
  for (const [id, r] of Object.entries(rooms)) {
    r.temp = Math.round((r.temp + (Math.random() * 0.4 - 0.2)) * 10) / 10;
    r.hum = Math.max(30, Math.min(95, r.hum + Math.floor(Math.random() * 3) - 1));
  }
  updatePanel();
}

function updateMapCounts() {
  for (const [id, r] of Object.entries(rooms)) {
    if (r.floor !== currentFloor) continue;
    const countEl = document.getElementById(`count-${id}`);
    const dotEl = document.getElementById(`dot-${id}`);
    const rectEl = document.getElementById(`rect-${id}`);
    if (countEl) {
      countEl.textContent = r.people;
      countEl.setAttribute('fill', crowdColor(r.people));
    }
    if (dotEl) {
      dotEl.className.baseVal = `crowd-dot ${crowdLevel(r.people)}`;
    }
  }
}

/* ═══════════════════════════════════════ */
/*  SMART SUGGESTION                       */
/* ═══════════════════════════════════════ */
function updateSmartNav() {
  if (selectedRoom && document.getElementById('nav-path')?.classList.contains('visible')) return;

  const floors = [1, 2];
  let best = null;
  for (const f of floors) {
    const fr = Object.values(rooms).filter(r => r.floor === f && r.type !== 'stairs' && r.type !== 'corridor');
    const avgPeople = Math.round(fr.reduce((s, r) => s + r.people, 0) / fr.length);
    const avgTemp = (fr.reduce((s, r) => s + r.temp, 0) / fr.length).toFixed(1);
    const lvl = crowdLevel(avgPeople);
    if (!best || avgPeople < best.avgPeople) best = { floor: f, avgPeople, avgTemp, lvl };
  }

  const lvlClass = best.lvl;
  document.getElementById('smart-text').innerHTML =
    `Smart Suggestion: Go to <span class="hl">Floor ${best.floor}</span> — Average crowd <span class="${lvlClass}">${crowdLabel(best.avgPeople)}</span> (<span class="hl">${best.avgPeople} people avg</span>, ${best.avgTemp}°C)`;
}

/* ═══════════════════════════════════════ */
/*  LAST UPDATED TICKER                    */
/* ═══════════════════════════════════════ */
function tickUpdated() {
  if (!selectedRoom) return;
  const ago = Math.floor((Date.now() - panelUpdateTime) / 1000);
  const el = document.getElementById('p-updated');
  if (el) el.textContent = ago + 's ago';
}

/* ═══════════════════════════════════════ */
/*  MODE TOGGLE                            */
/* ═══════════════════════════════════════ */
function toggleMode() {
  isLiveMode = !isLiveMode;
  const sw = document.getElementById('mode-switch');
  sw.classList.toggle('live', isLiveMode);
  document.getElementById('demo-label').classList.toggle('active', !isLiveMode);
  document.getElementById('live-label').classList.toggle('active', isLiveMode);
  document.getElementById('live-banner').classList.toggle('show', isLiveMode);

  if (isLiveMode) {
    document.getElementById('conn1').classList.add('disconnected');
    document.getElementById('conn2').classList.add('disconnected');
    document.getElementById('conn1-txt').textContent = 'Waiting…';
    document.getElementById('conn2-txt').textContent = 'Waiting…';
    fetchLiveData();
  } else {
    document.getElementById('conn1').classList.remove('disconnected');
    document.getElementById('conn2').classList.remove('disconnected');
    document.getElementById('conn1-txt').textContent = 'Connected';
    document.getElementById('conn2-txt').textContent = 'Connected';
  }
}

function fetchLiveData() {
  if (!isLiveMode) return;
  fetch('http://localhost:5000/status')
    .then(r => r.json())
    .then(data => {
      // Map received data to rooms
      if (data && data.rooms) {
        for (const [id, vals] of Object.entries(data.rooms)) {
          if (rooms[id]) Object.assign(rooms[id], vals);
        }
      }
      document.getElementById('conn1').classList.remove('disconnected');
      document.getElementById('conn2').classList.remove('disconnected');
      document.getElementById('conn1-txt').textContent = 'Connected';
      document.getElementById('conn2-txt').textContent = 'Connected';
      panelUpdateTime = Date.now();
      updateMapCounts();
      updatePanel();
      updateSmartNav();
    })
    .catch(() => {
      document.getElementById('conn1').classList.add('disconnected');
      document.getElementById('conn2').classList.add('disconnected');
      document.getElementById('conn1-txt').textContent = 'No Data';
      document.getElementById('conn2-txt').textContent = 'No Data';
    });
  setTimeout(fetchLiveData, 5000);
}

/* ═══════════════════════════════════════ */
/*  360° PANORAMA VIEWER                   */
/* ═══════════════════════════════════════ */
function open360() {
  if (!selectedRoom) return;
  const r = rooms[selectedRoom];
  const overlay = document.getElementById('pano-overlay');
  overlay.classList.add('active');
  document.getElementById('pano-title').textContent = r.name;
  document.getElementById('pano-sub').textContent = `Floor ${r.floor}`;
  document.getElementById('pano-people').textContent = r.people;
  document.getElementById('pano-temp').textContent = r.temp.toFixed(1) + '°C';

  renderMinimap();

  const container = document.getElementById('pano-container');
  // Clean previous
  if (panoViewer) {
    panoViewer.renderer.dispose();
    panoViewer.scene.clear();
    panoViewer = null;
  }
  const oldCanvas = container.querySelector('canvas');
  if (oldCanvas) oldCanvas.remove();

  try {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 1, 1100);
    camera.target = new THREE.Vector3(0, 0, 0);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry(500, 60, 40);
    geometry.scale(-1, 1, 1);
    const texture = new THREE.TextureLoader().load(
      'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/2294472375_24a3b8ef46_o.jpg'
    );
    const material = new THREE.MeshBasicMaterial({ map: texture });
    const sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    // Add hotspot sprites for connected rooms
    const connected = navGraph[selectedRoom] || [];
    connected.forEach((rid, i) => {
      const angle = (i / connected.length) * Math.PI * 2;
      const canvas2d = document.createElement('canvas');
      canvas2d.width = 128; canvas2d.height = 64;
      const ctx2d = canvas2d.getContext('2d');
      ctx2d.fillStyle = 'rgba(0,229,255,0.7)'; ctx2d.beginPath();
      ctx2d.roundRect(4, 4, 120, 56, 12); ctx2d.fill();
      ctx2d.fillStyle = '#000'; ctx2d.font = 'bold 16px sans-serif'; ctx2d.textAlign = 'center';
      ctx2d.fillText('→ ' + rooms[rid].name.substring(0, 12), 64, 28);
      ctx2d.font = '12px sans-serif';
      ctx2d.fillText('Click to go', 64, 46);
      const spriteTex = new THREE.CanvasTexture(canvas2d);
      const spriteMat = new THREE.SpriteMaterial({ map: spriteTex, depthTest: false });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.scale.set(60, 30, 1);
      sprite.position.set(Math.cos(angle) * 200, -50, Math.sin(angle) * 200);
      sprite.userData = { roomId: rid };
      scene.add(sprite);
    });

    // Mouse drag for 360° look
    let isDown = false, lon = 0, lat = 0, startX = 0, startY = 0, startLon = 0, startLat = 0;
    const onDown = e => { isDown = true; const ev = e.touches ? e.touches[0] : e; startX = ev.clientX; startY = ev.clientY; startLon = lon; startLat = lat; };
    const onMove = e => { if (!isDown) return; const ev = e.touches ? e.touches[0] : e; lon = (startX - ev.clientX) * 0.15 + startLon; lat = (ev.clientY - startY) * 0.15 + startLat; };
    const onUp = () => { isDown = false; };
    renderer.domElement.addEventListener('mousedown', onDown);
    renderer.domElement.addEventListener('mousemove', onMove);
    renderer.domElement.addEventListener('mouseup', onUp);
    renderer.domElement.addEventListener('mouseleave', onUp);
    renderer.domElement.addEventListener('touchstart', onDown, { passive: true });
    renderer.domElement.addEventListener('touchmove', onMove, { passive: true });
    renderer.domElement.addEventListener('touchend', onUp);

    // Click on hotspot
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    renderer.domElement.addEventListener('click', (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(scene.children);
      for (const h of hits) {
        if (h.object.userData && h.object.userData.roomId) {
          const rid = h.object.userData.roomId;
          close360();
          setTimeout(() => { selectRoom(rid); setTimeout(() => open360(), 300); }, 400);
          break;
        }
      }
    });

    // Auto-rotate
    let autoRotate = true;
    renderer.domElement.addEventListener('mousedown', () => { autoRotate = false; });

    // Animation loop
    let animId;
    function animate() {
      animId = requestAnimationFrame(animate);
      if (autoRotate) lon += 0.05;
      lat = Math.max(-85, Math.min(85, lat));
      const phi = THREE.MathUtils.degToRad(90 - lat);
      const theta = THREE.MathUtils.degToRad(lon);
      camera.target.x = 500 * Math.sin(phi) * Math.cos(theta);
      camera.target.y = 500 * Math.cos(phi);
      camera.target.z = 500 * Math.sin(phi) * Math.sin(theta);
      camera.lookAt(camera.target);
      renderer.render(scene, camera);
    }
    animate();

    // Resize handler
    const onResize = () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    };
    window.addEventListener('resize', onResize);

    panoViewer = { renderer, scene, camera, animId, onResize };
  } catch (e) {
    console.warn('360 viewer error:', e);
    container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:16px;flex-direction:column;gap:12px">
      <div style="font-size:48px">🔭</div>
      <div>360° viewer requires internet for Three.js CDN</div>
    </div>`;
  }
}

function close360() {
  const overlay = document.getElementById('pano-overlay');
  overlay.classList.remove('active');
  if (panoViewer) {
    cancelAnimationFrame(panoViewer.animId);
    window.removeEventListener('resize', panoViewer.onResize);
    panoViewer.renderer.dispose();
    panoViewer.scene.clear();
    panoViewer = null;
  }
  const container = document.getElementById('pano-container');
  const canvases = container.querySelectorAll('canvas');
  canvases.forEach(c => c.remove());
}

function renderMinimap() {
  if (!selectedRoom) return;
  const r = rooms[selectedRoom];
  const floorRooms = Object.entries(rooms).filter(([,rm]) => rm.floor === r.floor);
  const scale = 0.22;
  let svg = `<svg viewBox="0 0 180 130" xmlns="http://www.w3.org/2000/svg" style="background:transparent">`;
  for (const [id, rm] of floorRooms) {
    const cls = id === selectedRoom ? 'minimap-highlight' : '';
    const fill = id === selectedRoom ? 'rgba(0,229,255,.3)' : 'rgba(255,255,255,.05)';
    const stroke = id === selectedRoom ? 'var(--cyan)' : 'rgba(255,255,255,.15)';
    svg += `<rect class="${cls}" x="${rm.x * scale + 5}" y="${rm.y * scale + 5}" width="${rm.w * scale}" height="${rm.h * scale}" fill="${fill}" stroke="${stroke}" stroke-width="${id === selectedRoom ? 2 : .5}" rx="2"/>`;
  }
  svg += `</svg>`;
  document.getElementById('pano-minimap').innerHTML = svg;
}

/* ═══════════════════════════════════════ */
/*  INITIALIZATION                         */
/* ═══════════════════════════════════════ */
function init() {
  renderMap();
  updateSmartNav();

  // Data simulation intervals
  setInterval(() => { if (!isLiveMode) simulateData(); }, 4000);
  setInterval(() => { if (!isLiveMode) simulateEnv(); }, 8000);
  setInterval(tickUpdated, 1000);

  // Update 360 stats live
  setInterval(() => {
    if (selectedRoom && document.getElementById('pano-overlay').classList.contains('active')) {
      const r = rooms[selectedRoom];
      document.getElementById('pano-people').textContent = r.people;
      document.getElementById('pano-temp').textContent = r.temp.toFixed(1) + '°C';
    }
  }, 4000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
